<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>استمارة واجبات</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Noto Naskh Arabic",Arial,sans-serif;background:#f5f5f5;padding:20px;direction:rtl}
.page{width:210mm;min-height:297mm;background:white;margin:0 auto;padding:12mm 15mm 20mm;box-shadow:0 0 15px rgba(0,0,0,.15)}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;border-bottom:3px solid #1a3a5c;padding-bottom:12px}
.hright{text-align:right;flex:1}
.mn{font-size:19px;font-weight:900;color:#1a3a5c;margin-bottom:5px}
.of{font-size:16px;font-weight:700;color:#333;margin-bottom:4px}
.dp{font-size:15px;font-weight:700;color:#1a3a5c}
.hc{display:flex;align-items:center;justify-content:center;min-width:130px;padding:0 25px}
.hc img{width:110px;height:110px;object-fit:contain}
.hlft{flex:1;display:flex;flex-direction:column;gap:14px;padding-right:20px}
.fr{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.fr label{white-space:nowrap;color:#1a3a5c;min-width:55px}
.fl{display:inline-block;flex:1;border-bottom:1.5px solid #000;min-height:22px}
.ttl{text-align:center;font-size:22px;font-weight:900;color:#1a3a5c;margin:18px 0 12px}
table{width:100%;border-collapse:collapse;margin:0 0 20px}
th,td{border:1.5px solid #888;padding:9px 6px;text-align:center;font-size:13px;vertical-align:middle}
.mh th{background:#8e9dab;color:white;font-weight:900;font-size:13px}
.sh th{background:#e8eaed;color:#333;font-weight:900;font-size:12px}
.er td{height:42px}
.ftr{display:flex;justify-content:space-between;margin-top:70px;padding:0 40px}
.fi{font-size:17px;font-weight:900;text-align:center;color:#1a3a5c}
.fi .sl{display:block;width:150px;border-bottom:2px solid #1a3a5c;margin:45px auto 0}
.bw{text-align:center;margin-bottom:18px;display:flex;gap:10px;justify-content:center}
.db{padding:11px 28px;background:linear-gradient(135deg,#c41e3a,#8b0000);color:white;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;margin-left:10px;box-shadow:0 3px 12px rgba(196,30,58,.4);font-family:"Noto Naskh Arabic",Arial,sans-serif}
.pb{padding:11px 28px;background:linear-gradient(135deg,#2c3e50,#34495e);color:white;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;box-shadow:0 3px 12px rgba(44,62,80,.3);font-family:"Noto Naskh Arabic",Arial,sans-serif}
@media print{
  body{background:white;padding:0}
  .page{box-shadow:none;margin:0;width:100%;padding:8mm 12mm 15mm}
  .bw{display:none!important}
}
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
document.getElementById("dlbtn").onclick = async function(){
  var btn = document.getElementById("dlbtn");
  btn.textContent = "جاري التحضير..."; btn.disabled = true;
  try {
    var jsPDF = window.jspdf.jsPDF;
    var el = document.getElementById("pg");
    var c = await html2canvas(el, {scale:2, useCORS:true, allowTaint:true, backgroundColor:"#fff", logging:false});
    var img = c.toDataURL("image/jpeg", 0.95);
    var pdf = new jsPDF({orientation:"portrait", unit:"mm", format:"a4"});
    var pw = pdf.internal.pageSize.getWidth();
    var ratio = pw / c.width;
    pdf.addImage(img, "JPEG", 0, 0, pw, c.height * ratio);
    pdf.save("استمارة-واجبات.pdf");
  } catch(e) { alert("حدث خطأ اثناء التحضير"); }
  finally { btn.textContent = "تنزيل PDF"; btn.disabled = false; }
};
</script>
