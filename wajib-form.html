<!DOCTYPE html>
<html lang=ar dir=rtl>
<head>
<meta charset=UTF-8>
<title>wajib</title>
<link href=https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;700;900 rel=stylesheet>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Noto Naskh Arabic,Arial;background:#f5f5f5;padding:20px;direction:rtl}
.page{width:210mm;min-height:297mm;background:white;margin:0 auto;padding:15mm 20mm 25mm;box-shadow:0 0 10px rgba(0,0,0,.1)}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;border-bottom:3px double #1a3a5c;padding-bottom:15px}
.hright{text-align:right;flex:1}
.mn{font-size:18px;font-weight:900;color:#1a3a5c;margin-bottom:6px}
.of{font-size:16px;font-weight:700;color:#333;margin-bottom:4px}
.dp{font-size:14px;font-weight:700;color:#c41e3a}
.hc{display:flex;align-items:center;justify-content:center;padding:0 20px}
.hc img{width:90px;height:90px;object-fit:contain}
.hl{flex:1;display:flex;flex-direction:column;gap:12px;padding-top:5px}
.fr{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px}
.fr label{white-space:nowrap;color:#1a3a5c}
.fl{display:inline-block;flex:1;min-width:100px;border-bottom:1.5px solid #000}
.ttl{text-align:center;font-size:22px;font-weight:900;color:#1a3a5c;margin:20px 0;padding:10px;border:2px solid #1a3a5c;border-radius:6px;background:#f0f4f8}
table{width:100%;border-collapse:collapse;margin:10px 0 30px 0}
th,td{border:1.5px solid #6899c8;padding:10px 8px;text-align:center;font-size:14px;vertical-align:middle}
.er td{height:42px}
.ftr{display:flex;justify-content:space-between;margin-top:50px;padding:0 20px}
.fi{font-size:16px;font-weight:900;text-align:center;color:#1a3a5c}
.fi .sl{display:block;width:130px;border-bottom:1.5px solid #000;margin:30px auto 5px auto}
@media print{body,page{background:white;padding:0}.page{box-shadow:none;margin:0;width:100%}.bw{display:none!important}}
.bw{text-align:center;margin-bottom:20px}
.db{padding:12px 30px;background:linear-gradient(135deg,#c41e3a,#8b0000);color:white;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;margin-left:10px}
.pb{padding:12px 30px;background:linear-gradient(135deg,#2c3e50,#34495e);color:white;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class=bw>
<button class=pb id=prbtn>طباعة</button>
<button class=db id=dlbtn>تنزيل PDF</button>
</div>
<div class=page id=pg>
<div class=hdr>
<div class=hright>
<div class=mn>جمهورية العراق</div>
<div class=mn>وزارة الشباب والرياضة</div>
<div class=of>مكتب الوزير</div>
<div class=dp>مكتب التصاريح الامنية</div>
</div>
<div class=hc><img src=image.jpeg alt=logo></div>
<div class=hl>
<div class=fr><label>الشعبة:</label><span class=fl></span></div>
<div class=fr><label>الوحدة:</label><span class=fl></span></div>
<div class=fr><label>التاريخ:</label><span class=fl></span></div>
</div>
</div>
<div class=ttl>استمارة الواجبات</div>
<table>
<thead>
<tr>
<th rowspan=2 style=background:#5b8ec7;color:white;width:5%>ت</th>
<th rowspan=2 style=background:#5b8ec7;color:white>اسم الموظف</th>
<th rowspan=2 style=background:#5b8ec7;color:white>العنوان الوظيفي</th>
<th colspan=2 style=background:#5b8ec7;color:white>وقت الخروج</th>
<th rowspan=2 style=background:#5b8ec7;color:white>اسم الجهة المقصودة بالمواجب</th>
<th rowspan=2 style=background:#5b8ec7;color:white>الملاحظات</th>
</tr>
<tr>
<th style=background:#a8c8e8;color:#1a3a5c>من الساعة</th>
<th style=background:#a8c8e8;color:#1a3a5c>الى الساعة</th>
</tr>
</thead>
<tbody>
<tr class=er><td>1</td><td></td><td></td><td></td><td></td><td></td><td></td></tr><tr class=er><td>2</td><td></td><td></td><td></td><td></td><td></td><td></td></tr><tr class=er><td>3</td><td></td><td></td><td></td><td></td><td></td><td></td></tr><tr class=er><td>4</td><td></td><td></td><td></td><td></td><td></td><td></td></tr><tr class=er><td>5</td><td></td><td></td><td></td><td></td><td></td><td></td></tr><tr class=er><td>6</td><td></td><td></td><td></td><td></td><td></td><td></td></tr><tr class=er><td>7</td><td></td><td></td><td></td><td></td><td></td><td></td></tr><tr class=er><td>8</td><td></td><td></td><td></td><td></td><td></td><td></td></tr><tr class=er><td>9</td><td></td><td></td><td></td><td></td><td></td><td></td></tr><tr class=er><td>10</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
</tbody>
</table>
<div class=ftr>
<div class=fi>مسؤول الوحدة<span class=sl></span>الاسم: _______________</div>
<div class=fi>مسؤول الشعبة<span class=sl></span>الاسم: _______________</div>
</div>
</div>
<script src=https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js></script>
<script src=https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js></script>
<script>
document.getElementById('prbtn').onclick=function(){window.print()};
document.getElementById('dlbtn').onclick=async function(){
var btn=document.getElementById('dlbtn');
btn.textContent='جاري...';btn.disabled=true;
try{
var jsPDF=window.jspdf.jsPDF;
var el=document.getElementById('pg');
var c=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#fff',logging:false});
var img=c.toDataURL('image/jpeg',0.95);
var pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
var pw=pdf.internal.pageSize.getWidth();
var ratio=pw/c.width;
pdf.addImage(img,'JPEG',0,0,pw,c.height*ratio);
pdf.save('wajib.pdf');
}catch(e){alert('error');}
finally{btn.textContent='تنزيل PDF';btn.disabled=false;}
};
</script>
</body>
</html>
